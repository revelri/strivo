name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    name: Build x86_64-linux tarball
    runs-on: [self-hosted, linux, x64, arch]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Toolchain
        run: rustup show active-toolchain || rustup default stable

      - name: Build release
        run: cargo build --release --locked

      - name: Generate completions + manpage
        run: |
          mkdir -p dist/completions dist/man
          ./target/release/strivo completions bash > dist/completions/strivo.bash
          ./target/release/strivo completions zsh  > dist/completions/_strivo
          ./target/release/strivo completions fish > dist/completions/strivo.fish
          ./target/release/strivo man > dist/man/strivo.1

      - name: Stage tarball
        id: stage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="strivo-${VERSION}-x86_64-unknown-linux-gnu"
          mkdir -p "dist/${PKG}"
          cp target/release/strivo                  "dist/${PKG}/"
          cp README.md LICENSE CHANGELOG.md         "dist/${PKG}/"
          cp -r dist/completions                    "dist/${PKG}/"
          cp -r dist/man                            "dist/${PKG}/"
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"
          (cd dist && sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256")
          echo "pkg=${PKG}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: |
            dist/${{ steps.stage.outputs.pkg }}.tar.gz
            dist/${{ steps.stage.outputs.pkg }}.tar.gz.sha256
          generate_release_notes: true
          body: |
            # strivo ${{ github.ref_name }}

            Alpha release. See [CHANGELOG.md](https://github.com/Chorosyne/strivo/blob/main/CHANGELOG.md) for the human-curated release notes.

            **This artifact is Linux x86_64 only.** macOS and Windows binaries are not produced by CI yet; build from source on those platforms (`cargo build --release`).
