version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    groups:
      rust-patch:
        update-types:
          - patch
      rust-minor:
        update-types:
          - minor

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      actions-all:
        update-types:
          - minor
          - patch

  - package-ecosystem: gitsubmodule
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - submodule
